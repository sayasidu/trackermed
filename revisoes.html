<!doctype html>
<html lang="pt-BR"><head><link rel="icon" type="image/png" href="favicon.png"><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Revisões · TrackerMed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
.rev-list { display: flex; flex-direction: column; gap: 8px; }
.rev-row { background: var(--card); border: 1px solid var(--line); padding: 18px 22px; display: grid; grid-template-columns: 1fr auto auto; gap: 20px; align-items: center; transition: border-color .15s; }
.rev-row:hover { border-color: var(--ink); }
.rev-row.done { border-left: 4px solid var(--mint); }
.rev-row.pending { border-left: 4px solid var(--amber); }
.rev-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
.rev-meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
.rev-status { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.rev-status.ok { color: var(--mint); }
.rev-status.pend { color: var(--amber); }
.rev-count { font-family: 'Fraunces', serif; font-size: 28px; letter-spacing: -0.03em; font-weight: 500; color: var(--cobalt); min-width: 70px; text-align: right; font-variant-numeric: tabular-nums; }
.rev-count span { font-size: 12px; color: var(--muted); font-family: 'Inter Tight', sans-serif; font-weight: 500; }
.rev-empty { background: var(--card); border: 1px solid var(--line); padding: 60px 32px; text-align: center; color: var(--muted); font-size: 14px; font-style: italic; }
.rev-empty a { color: var(--cobalt); font-weight: 600; font-style: normal; }
.rev-empty .sub { font-size: 12px; margin-top: 8px; display: block; }
</style></head><body>
<div class="app">
<aside class="sidebar">
<div class="logo">Tracker<em>Med</em></div>
<a href="index.html" class="nav-item">Home</a>
<a href="planos.html" class="nav-item">Planos</a>
<a href="disciplinas.html" class="nav-item">Disciplinas</a>
<a href="plannerstudy.html" class="nav-item">Planejamento</a>
<a href="revisoes.html" class="nav-item active">Revisões</a>
<a href="historico.html" class="nav-item">Histórico</a>
<a href="erros.html" class="nav-item">Caderno de erros</a>
<a href="dashboard.html" class="nav-item">Estatísticas</a>
<a href="simulados.html" class="nav-item">Simulados</a>
<div class="sidebar-foot">v0.1 · pessoal</div>
</aside>
<main class="main">
<div class="topbar">
  <div class="crumb">Home <i>›</i> Revisões</div>
  <div class="topbar-right"><span class="pill" id="revPill">—</span></div>
</div>
<div>
  <div class="kicker">Feed do histórico</div>
  <h1 class="page-title">Sua <i>revisão</i>.</h1>
  <p class="page-lede">Tudo que você marcou como “revisar depois” no histórico aparece aqui, agrupado por data.</p>
</div>
<div id="revRoot" style="margin-top:32px"></div>
</main></div>
<script>
const HIST_KEY = 'historicoEstudos';

function loadHist() {
  try { const v = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); return Array.isArray(v) ? v : []; }
  catch { return []; }
}
function parseBR(s) {
  const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s || '');
  return m ? new Date(+m[3], +m[2]-1, +m[1]) : new Date(0);
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function plural(n, sing, plur) { return n === 1 ? sing : plur; }

function render() {
  const itens = loadHist().filter(x => x && x.revisar === true);
  const root = document.getElementById('revRoot');
  const pill = document.getElementById('revPill');
  pill.textContent = itens.length ? `${itens.length} ${plural(itens.length, 'item', 'itens')}` : 'vazio';

  if (itens.length === 0) {
    root.innerHTML = `<div class="rev-empty">Nenhum conteúdo marcado para revisão ainda.<span class="sub">Marque “Revisar depois?” ao registrar um estudo extra no <a href="historico.html">histórico</a>.</span></div>`;
    return;
  }

  const grupos = {};
  itens.forEach(x => { (grupos[x.data] = grupos[x.data] || []).push(x); });
  const datas = Object.keys(grupos).sort((a, b) => parseBR(b) - parseBR(a));

  root.innerHTML = datas.map(data => {
    const arr = grupos[data];
    return `<div class="section">
      <div class="section-head">
        <div class="section-title">${escapeHtml(data)}</div>
        <div class="kicker">${arr.length} ${plural(arr.length, 'item', 'itens')}</div>
      </div>
      <div class="rev-list">
        ${arr.map(r => {
          const concluido = !!r.concluido;
          const mins = parseInt(r.minutos) || 0;
          return `<div class="rev-row ${concluido ? 'done' : 'pending'}">
            <div>
              <div class="rev-title">${escapeHtml(r.materia || 'Estudo')}</div>
              <div class="rev-meta">
                <span>📅 ${escapeHtml(r.data || '')}</span>
                <span>· ${mins} min</span>
              </div>
            </div>
            <div class="rev-status ${concluido ? 'ok' : 'pend'}">${concluido ? '✓ Concluído' : '◯ Não concluído'}</div>
            <div class="rev-count">${mins}<br><span>min</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

render();
// Atualiza se outra aba (ex.: histórico) gravar novos registros.
window.addEventListener('storage', e => { if (e.key === HIST_KEY) render(); });
</script>
</body></html>
