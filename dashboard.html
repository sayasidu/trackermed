<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>TrackerMed · Dashboard — 3 variações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variations/v1-cobalto.jsx"></script>
<script type="text/babel" src="variations/v2-lima.jsx"></script>
<script type="text/babel" src="variations/v3-magenta.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <div style={{ padding: '0 60px 40px', maxWidth: 1200 }}>
        <div style={{ fontFamily: '"Fraunces", serif', fontSize: 44, fontWeight: 600, letterSpacing: -1.5, color: '#2a2418', lineHeight: 1.05 }}>
          TrackerMed · Dashboard Home
        </div>
        <div style={{ fontFamily: '-apple-system, sans-serif', fontSize: 15, color: 'rgba(60,50,40,0.7)', marginTop: 10, maxWidth: 680, lineHeight: 1.5 }}>
          Três variações do painel de estudo para residência médica. Cada uma leva uma paleta,
          uma hierarquia tipográfica e um estilo de visualização de dados diferentes — misture
          e combine os elementos que mais gostar. Arraste para navegar · scroll p/ zoom.
        </div>
      </div>

      <DCSection
        title="01 · Cobalto Elétrico"
        subtitle="Editorial serif + cobalto profundo + acento amarelo ácido. Anéis, número grande, tom confiante/clássico."
      >
        <DCArtboard label="1280 × 820 · Home" width={1280} height={820}>
          <V1Dashboard />
        </DCArtboard>
        <DCPostIt top={-20} left={1260} rotate={3} width={200}>
          Sidebar escura destaca a marca. KPI grande com serif <b>Fraunces</b> dá sensação editorial, não genérico.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="02 · Lima Ácida"
        subtitle="Dark mode · Space Grotesk + JetBrains Mono · heatmap e barras. Vibe terminal/produtividade, para quem curte data-density."
      >
        <DCArtboard label="1280 × 820 · Home (dark)" width={1280} height={820}>
          <V2Dashboard />
        </DCArtboard>
        <DCPostIt top={-20} left={1260} rotate={-2} width={200}>
          Heatmap 18×7 substitui a tira de streak — mostra <b>padrão</b>, não só última semana. Log com timestamps tipo commit.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="03 · Magenta Cirúrgica"
        subtitle="Brutalista · IBM Plex Serif + Mono · grid assimétrico com bordas pretas, magenta quente + amarelo. Números gigantes, hierarquia clara."
      >
        <DCArtboard label="1280 × 820 · Home" width={1280} height={820}>
          <V3Dashboard />
        </DCArtboard>
        <DCPostIt top={-20} left={1260} rotate={2} width={200}>
          KPIs em grid assimétrico: tempo de estudo domina, resto se organiza ao redor. Sparklines por disciplina.
        </DCPostIt>
      </DCSection>

      <div style={{ padding: '20px 60px 40px', fontFamily: '"Inter Tight", sans-serif', fontSize: 13, color: 'rgba(60,50,40,0.6)', maxWidth: 900, lineHeight: 1.6 }}>
        <b>Eixos de variação:</b> &nbsp;paleta (clara warm · dark terminal · cream brutalista) · tipografia (serif editorial · grotesque+mono · plex serif+mono) · data-viz (anéis + barra horizontal de streak · heatmap + barras · sparklines + grid de streak) · densidade (confortável · alta · média).
        <br /><br />
        <b>Próximos passos:</b> me diga qual direção prefere (ou mistura, ex. paleta da 3 com layout da 1) e eu refino em alta fidelidade com os tweaks (tema escuro, densidade, cor de acento) ativáveis.
      </div>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
