<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TrackerMed · Planejamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  /* planner-specific overrides */
  .planner-main { padding: 28px 36px 48px; }
  .planner-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .planner-head h1 { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 500; letter-spacing: -0.035em; line-height: 1; }
  .planner-head h1 i { color: var(--muted); font-style: italic; }
  .planner-kicker { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .ctrl-row { display: flex; gap: 10px; align-items: center; }
  .ctrl { display: flex; border: 1px solid var(--line); background: var(--card); }
  .ctrl button { background: transparent; border: none; padding: 9px 14px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--ink2); border-right: 1px solid var(--line); }
  .ctrl button:last-child { border-right: none; }
  .ctrl button.active { background: var(--ink); color: var(--paper); font-weight: 600; }
  .ctrl button:hover:not(.active) { background: var(--paper); }
  .add-btn { background: var(--cobalt); color: #fff; border: none; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .add-btn:hover { opacity: 0.9; }

  .stats-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--card); border: 1px solid var(--line); padding: 16px 20px; }
  .stat.dark { background: var(--ink); color: var(--paper); }
  .stat .lbl { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .stat.dark .lbl { color: var(--acid); }
  .stat .num { font-family: 'Fraunces', serif; font-size: 40px; font-weight: 500; letter-spacing: -0.035em; line-height: 1; margin-top: 8px; }
  .stat .num span { font-size: 16px; color: var(--muted); }
  .stat.dark .num span { color: rgba(244,241,234,0.6); }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .stat.dark .sub { color: rgba(244,241,234,0.7); }

  .grid-wrap { border: 1px solid var(--line); background: var(--card); overflow: hidden; }
  .grid-header { display: grid; grid-template-columns: 56px repeat(7, 1fr); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 3; background: var(--card); }
  .grid-header .gh { padding: 12px 10px; border-left: 1px solid var(--line); position: relative; }
  .grid-header .gh:first-child { border-left: none; }
  .grid-header .gh.today { background: var(--ink); color: var(--paper); }
  .gh .short { font-size: 10px; letter-spacing: 0.15em; font-weight: 600; color: var(--muted); }
  .gh.today .short { color: var(--acid); }
  .gh .num { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: -0.03em; line-height: 1; margin-top: 2px; }
  .gh .today-chip { display: inline-block; font-size: 10px; background: var(--acid); color: var(--ink); padding: 2px 6px; font-weight: 700; letter-spacing: 0.05em; margin-left: 6px; vertical-align: middle; }

  .grid-body { display: grid; grid-template-columns: 56px repeat(7, 1fr); }
  .hour-col > div { height: 40px; border-bottom: 1px solid var(--line); font-size: 10px; color: var(--muted); padding: 0 8px 0 0; text-align: right; font-variant-numeric: tabular-nums; position: relative; }
  .hour-col > div span { position: relative; top: -6px; background: var(--card); padding: 0 2px; }
  .day-col { position: relative; border-left: 1px solid var(--line); }
  .day-col.today { background: rgba(30,58,232,0.035); }
  .hour-slot { height: 40px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .1s; }
  .hour-slot:hover { background: rgba(30,58,232,0.08); }
  .hour-slot.lunch { background: rgba(107,106,95,0.04); }
  .hour-slot.lunch:hover { background: rgba(30,58,232,0.08); }

  .session-block { position: absolute; left: 3px; right: 3px; padding: 5px 8px; font-size: 10.5px; line-height: 1.2; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; gap: 2px; transition: all .1s; }
  .session-block:hover { z-index: 4; box-shadow: 0 4px 12px rgba(10,19,48,0.15); }
  .session-block .tagline { font-size: 8.5px; letter-spacing: 0.08em; font-weight: 700; display: flex; justify-content: space-between; line-height: 1.1; }
  .session-block .title { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
  .session-block .recur { position: absolute; top: 4px; right: 6px; font-size: 9px; opacity: 0.6; }

  .now-line { position: absolute; left: 0; right: 0; border-top: 2px solid var(--rose); z-index: 2; pointer-events: none; }
  .now-line::before { content: ''; position: absolute; left: -4px; top: -5px; width: 8px; height: 8px; background: var(--rose); border-radius: 50%; }

  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 11px; margin-top: 16px; color: var(--ink2); }
  .legend .sw { display: inline-flex; align-items: center; gap: 6px; }
  .legend .sw i { width: 10px; height: 10px; font-style: normal; }

  /* empty state */
  .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; }
  .empty-state h3 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .empty-state p { font-size: 13px; color: var(--muted); }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(10,19,48,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--card); border: 1px solid var(--line); width: 440px; max-width: calc(100vw - 32px); max-height: calc(100vh - 32px); overflow-y: auto; padding: 28px; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; letter-spacing: 0.12em; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
  .field input[type="text"], .field input[type="number"], .field select, .field textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--line); background: var(--paper); font-size: 13px; font-family: inherit; color: var(--ink); }
  .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--cobalt); outline-offset: -1px; border-color: var(--cobalt); }
  .field.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field.row > div label { display: block; }
  .type-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .type-pill { padding: 7px 14px; border: 1px solid var(--line); background: var(--paper); cursor: pointer; font-size: 12px; font-weight: 500; }
  .type-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink2); cursor: pointer; }
  .checkbox-row input { width: 16px; height: 16px; accent-color: var(--cobalt); cursor: pointer; }
  .modal-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
  .btn-delete { background: transparent; border: none; color: var(--rose); font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; padding: 8px 0; }
  .btn-group { display: flex; gap: 8px; }
  .btn-cancel { background: transparent; border: 1px solid var(--line); padding: 9px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-save { background: var(--cobalt); color: #fff; border: none; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* overflow nudge */
  @media (max-width: 1100px) {
    .stats-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// --- Constants
const HOUR_START = 6;
const HOUR_END = 23;
const HOURS = Array.from({ length: HOUR_END - HOUR_START + 1 }, (_, i) => HOUR_START + i);
const ROW_H = 40;
const DAYS_SHORT = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];

const DISCIPLINAS = [
  'Morfofuncional', 'Emergências', 'Farmacologia', 'Hematológicas',
  'Saúde Coletiva', 'Clínica Médica', 'Cardiologia', 'Pediatria',
  'Ginecologia', 'Psiquiatria', 'Outro'
];

const DISC_COLOR = {
  'Morfofuncional':  { color: '#1E3AE8', soft: '#DDE3FF' },
  'Emergências':     { color: '#FF5B5B', soft: '#FFD9D9' },
  'Farmacologia':    { color: '#8E5CF7', soft: '#E8DFFE' },
  'Hematológicas':   { color: '#1FC28A', soft: '#CFF1E3' },
  'Saúde Coletiva':  { color: '#FF8A4A', soft: '#FFE2D0' },
  'Clínica Médica':  { color: '#3DB6E6', soft: '#D5ECF7' },
  'Cardiologia':     { color: '#D94B7A', soft: '#FAD7E1' },
  'Pediatria':       { color: '#F4A72F', soft: '#FBE8C6' },
  'Ginecologia':     { color: '#A04FC5', soft: '#EAD5F5' },
  'Psiquiatria':     { color: '#4A9E7F', soft: '#D4ECE1' },
  'Outro':           { color: '#6B6A5F', soft: '#E4DFD2' },
};

const TYPE_CONFIG = {
  estudo:   { label: 'Estudo',   icon: '📘' },
  revisao:  { label: 'Revisão',  icon: '🔁' },
  simulado: { label: 'Simulado', icon: '⚡' },
};

// --- Date helpers
function startOfWeek(date) {
  const d = new Date(date);
  const dow = (d.getDay() + 6) % 7; // Monday=0
  d.setDate(d.getDate() - dow);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function sameYMD(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isoDate(d) { return d.toISOString().split('T')[0]; }
function formatRange(monday) {
  const sun = addDays(monday, 6);
  const mo = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  if (monday.getMonth() === sun.getMonth()) {
    return `${monday.getDate()} a ${sun.getDate()} de ${mo[monday.getMonth()]}`;
  }
  return `${monday.getDate()} ${mo[monday.getMonth()]} — ${sun.getDate()} ${mo[sun.getMonth()]}`;
}
function weekNum(d) {
  const target = new Date(d.valueOf());
  const dayNr = (d.getDay() + 6) % 7;
  target.setDate(target.getDate() - dayNr + 3);
  const firstThursday = target.valueOf();
  target.setMonth(0, 1);
  if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
  return 1 + Math.ceil((firstThursday - target) / 604800000);
}
function hoursToLabel(h) {
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// --- Storage
const STORAGE_KEY = 'trackermed.planner.sessions.v1';

function loadSessions() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch { return []; }
}
function saveSessions(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

// --- Sidebar
function Sidebar() {
  const items = [
    { name:'Home', href:'index.html' },
    { name:'Planos', href:'planos.html' },
    { name:'Disciplinas', href:'disciplinas.html' },
    { name:'Planejamento', href:'plannerstudy.html', active:true },
    { name:'Revisões', href:'revisoes.html' },
    { name:'Histórico', href:'historico.html' },
    { name:'Estatísticas', href:'dashboard.html' },
    { name:'Simulados', href:'simulados.html' },
  ];
  return (
    <aside className="sidebar">
      <div className="logo">Tracker<em>Med</em></div>
      {items.map(it => (
        <a key={it.name} href={it.href} className={`nav-item ${it.active ? 'active' : ''}`}>
          {it.name}
        </a>
      ))}
      <div className="sidebar-foot">v0.1 · pessoal</div>
    </aside>
  );
}

// --- Session Modal
function SessionModal({ session, isNew, onSave, onDelete, onCancel }) {
  const [form, setForm] = useState(session);
  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const save = () => {
    if (form.endHour <= form.startHour) { alert('Horário final deve ser depois do início.'); return; }
    if (!form.title.trim()) { alert('Dá um título pra sessão.'); return; }
    onSave(form);
  };

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h2>{isNew ? 'Nova sessão' : 'Editar sessão'}</h2>
        <div className="modal-sub">
          {DAYS_SHORT[form.dayIdx]} · {hoursToLabel(form.startHour)} — {hoursToLabel(form.endHour)}
        </div>

        <div className="field">
          <label>Tipo</label>
          <div className="type-pills">
            {Object.entries(TYPE_CONFIG).map(([k, v]) => (
              <div key={k}
                   className={`type-pill ${form.type === k ? 'active' : ''}`}
                   onClick={() => update('type', k)}>
                {v.icon} {v.label}
              </div>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Disciplina</label>
          <select value={form.disc} onChange={e => update('disc', e.target.value)}>
            {DISCIPLINAS.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>

        <div className="field">
          <label>Título / descrição</label>
          <input type="text" value={form.title} onChange={e => update('title', e.target.value)}
                 placeholder="Ex: Sistema cardiovascular — aula + questões" autoFocus />
        </div>

        <div className="field row">
          <div>
            <label>Início</label>
            <select value={form.startHour} onChange={e => update('startHour', parseFloat(e.target.value))}>
              {Array.from({length: (HOUR_END - HOUR_START) * 2 + 1}, (_, i) => HOUR_START + i * 0.5).map(h =>
                <option key={h} value={h}>{hoursToLabel(h)}</option>
              )}
            </select>
          </div>
          <div>
            <label>Fim</label>
            <select value={form.endHour} onChange={e => update('endHour', parseFloat(e.target.value))}>
              {Array.from({length: (HOUR_END - HOUR_START) * 2 + 1}, (_, i) => HOUR_START + i * 0.5 + 0.5).map(h =>
                <option key={h} value={h}>{hoursToLabel(h)}</option>
              )}
            </select>
          </div>
        </div>

        <div className="field row">
          <div>
            <label>Meta de questões</label>
            <input type="number" min="0" value={form.goalQ || ''} onChange={e => update('goalQ', e.target.value ? parseInt(e.target.value) : 0)} placeholder="0" />
          </div>
          <div>
            <label>Meta flashcards</label>
            <input type="number" min="0" value={form.goalF || ''} onChange={e => update('goalF', e.target.value ? parseInt(e.target.value) : 0)} placeholder="0" />
          </div>
        </div>

        <div className="field">
          <label className="checkbox-row">
            <input type="checkbox" checked={!!form.recurring} onChange={e => update('recurring', e.target.checked)} />
            <span>🔁 Repetir toda semana</span>
          </label>
        </div>

        <div className="modal-actions">
          {!isNew ? (
            <button className="btn-delete" onClick={() => { if (confirm('Apagar essa sessão?')) onDelete(form.id); }}>
              Apagar
            </button>
          ) : <div />}
          <div className="btn-group">
            <button className="btn-cancel" onClick={onCancel}>Cancelar</button>
            <button className="btn-save" onClick={save}>{isNew ? 'Criar' : 'Salvar'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// --- Session block on grid
function SessionBlock({ s, onClick }) {
  const d = DISC_COLOR[s.disc] || DISC_COLOR['Outro'];
  const dur = s.endHour - s.startHour;
  const top = (s.startHour - HOUR_START) * ROW_H;
  const height = dur * ROW_H - 3;
  const isMock = s.type === 'simulado';
  const isReview = s.type === 'revisao';
  const compact = dur <= 0.75;
  const typeIcon = TYPE_CONFIG[s.type]?.icon || '';

  return (
    <div className="session-block"
         onClick={e => { e.stopPropagation(); onClick(s); }}
         style={{
           top, height,
           background: isReview ? '#fff' : d.soft,
           borderLeft: `3px solid ${d.color}`,
           border: isReview ? `1px dashed ${d.color}` : `1px solid ${d.color}`,
           boxShadow: isMock ? `inset 0 -3px 0 #E6FF3D` : 'none',
         }}>
        <div className="tagline" style={{ color: d.color }}>
          <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.disc.toUpperCase()}</span>
          <span style={{ color: '#6B6A5F', fontWeight: 500, flexShrink: 0, marginLeft: 4 }}>
            {typeIcon} {dur}h
          </span>
        </div>
        {!compact && <div className="title">{s.title}</div>}
        {compact && <div className="title" style={{ whiteSpace: 'nowrap' }}>{s.title}</div>}
        {s.recurring && <span className="recur">🔁</span>}
    </div>
  );
}

// --- Main planner
function Planner() {
  const [sessions, setSessions] = useState(loadSessions);
  const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
  const [modal, setModal] = useState(null);
  const [view, setView] = useState('week');

  // Persist on change
  useEffect(() => { saveSessions(sessions); }, [sessions]);

  // Live now-time for the red line
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(t);
  }, []);

  const today = new Date();
  const days = useMemo(() => Array.from({length:7}, (_, i) => {
    const d = addDays(weekStart, i);
    return { date: d, short: DAYS_SHORT[i], num: d.getDate(), isToday: sameYMD(d, today) };
  }), [weekStart]);

  // Stats: total hours planned this week
  const weeklyHours = useMemo(() => {
    return sessions.reduce((sum, s) => sum + (s.endHour - s.startHour), 0);
  }, [sessions]);

  const totalQuestions = useMemo(() => sessions.reduce((sum, s) => sum + (s.goalQ || 0), 0), [sessions]);
  const totalFlashcards = useMemo(() => sessions.reduce((sum, s) => sum + (s.goalF || 0), 0), [sessions]);

  const openNew = (dayIdx, startHour) => {
    setModal({
      isNew: true,
      data: {
        id: 'tmp-' + Date.now(),
        dayIdx,
        startHour,
        endHour: Math.min(startHour + 1, HOUR_END + 0.5),
        disc: DISCIPLINAS[0],
        title: '',
        type: 'estudo',
        goalQ: 0,
        goalF: 0,
        recurring: false,
      }
    });
  };
  const openEdit = (s) => setModal({ isNew: false, data: { ...s } });

  const handleSave = (form) => {
    if (modal.isNew) {
      setSessions(list => [...list, form]);
    } else {
      setSessions(list => list.map(x => x.id === form.id ? form : x));
    }
    setModal(null);
  };
  const handleDelete = (id) => {
    setSessions(list => list.filter(x => x.id !== id));
    setModal(null);
  };

  const shiftWeek = (delta) => setWeekStart(w => addDays(w, delta * 7));
  const goToday = () => setWeekStart(startOfWeek(new Date()));

  // Days/sessions rendering
  const sessionsByDay = useMemo(() => {
    const byDay = Array.from({length:7}, () => []);
    sessions.forEach(s => { if (s.dayIdx >= 0 && s.dayIdx < 7) byDay[s.dayIdx].push(s); });
    return byDay;
  }, [sessions]);

  return (
    <>
    <div className="app">
      <Sidebar />
      <main className="main planner-main">
        <div className="topbar">
          <div className="crumb">Home <i>›</i> Planejamento</div>
          <div className="topbar-right">
            <span className="pill">Semana {weekNum(weekStart)}</span>
            <span style={{color:'var(--muted)', fontSize:12}}>
              {sessions.length} sessões salvas · {weeklyHours.toFixed(1)}h planejadas
            </span>
          </div>
        </div>

        <div className="planner-head">
          <div>
            <div className="planner-kicker">Planejamento semanal</div>
            <h1>{formatRange(weekStart)} <i>· {weekStart.getFullYear()}</i></h1>
          </div>
          <div className="ctrl-row">
            <div className="ctrl">
              <button onClick={() => shiftWeek(-1)}>‹</button>
              <button onClick={goToday}>Hoje</button>
              <button onClick={() => shiftWeek(+1)}>›</button>
            </div>
            <div className="ctrl">
              <button className={view==='week' ? 'active' : ''} onClick={() => setView('week')}>Semana</button>
              <button className={view==='list' ? 'active' : ''} onClick={() => setView('list')}>Lista</button>
            </div>
            <button className="add-btn" onClick={() => openNew(0, 8)}>+ Nova sessão</button>
          </div>
        </div>

        <div className="stats-strip">
          <div className="stat">
            <div className="lbl">Horas planejadas</div>
            <div className="num">{Math.floor(weeklyHours)}<span>h {Math.round((weeklyHours % 1) * 60).toString().padStart(2,'0')}m</span></div>
            <div className="sub">na semana toda</div>
          </div>
          <div className="stat">
            <div className="lbl">Sessões</div>
            <div className="num">{sessions.length}</div>
            <div className="sub">{sessions.filter(s => s.recurring).length} recorrentes</div>
          </div>
          <div className="stat">
            <div className="lbl">Meta de questões</div>
            <div className="num" style={{color:'var(--cobalt)'}}>{totalQuestions}</div>
            <div className="sub">{totalFlashcards} flashcards</div>
          </div>
          <div className="stat dark">
            <div className="lbl">Simulados</div>
            <div className="num" style={{color:'var(--acid)'}}>{sessions.filter(s => s.type === 'simulado').length}</div>
            <div className="sub">esta semana</div>
          </div>
        </div>

        {view === 'week' && (
          <div className="grid-wrap">
            <div className="grid-header">
              <div />
              {days.map((d, i) => (
                <div key={i} className={`gh ${d.isToday ? 'today' : ''}`}>
                  <div className="short">{d.short}</div>
                  <div>
                    <span className="num">{d.num}</span>
                    {d.isToday && <span className="today-chip">HOJE</span>}
                  </div>
                </div>
              ))}
            </div>
            <div className="grid-body">
              <div className="hour-col">
                {HOURS.map(h => (
                  <div key={h}><span>{String(h).padStart(2,'0')}:00</span></div>
                ))}
              </div>
              {days.map((d, di) => (
                <div key={di} className={`day-col ${d.isToday ? 'today' : ''}`}>
                  {HOURS.map((h, hi) => (
                    <div key={hi}
                         className={`hour-slot ${h >= 12 && h < 13 ? 'lunch' : ''}`}
                         onClick={() => openNew(di, h)} />
                  ))}
                  {d.isToday && (() => {
                    const nowH = now.getHours() + now.getMinutes() / 60;
                    if (nowH < HOUR_START || nowH > HOUR_END + 1) return null;
                    return <div className="now-line" style={{ top: (nowH - HOUR_START) * ROW_H }} />;
                  })()}
                  {sessionsByDay[di].map(s => <SessionBlock key={s.id} s={s} onClick={openEdit} />)}
                </div>
              ))}
            </div>
          </div>
        )}

        {view === 'list' && (
          <div style={{ background: 'var(--card)', border: '1px solid var(--line)' }}>
            {sessions.length === 0 ? (
              <div className="empty-state">
                <h3>Nenhuma sessão ainda.</h3>
                <p>Clica no botão "+ Nova sessão" ou num horário da grade.</p>
              </div>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Dia</th><th>Horário</th><th>Disciplina</th><th>Título</th>
                    <th>Tipo</th><th style={{textAlign:'right'}}>Duração</th><th style={{textAlign:'right'}}>Meta</th>
                  </tr>
                </thead>
                <tbody>
                  {[...sessions].sort((a,b) => a.dayIdx - b.dayIdx || a.startHour - b.startHour).map(s => {
                    const d = DISC_COLOR[s.disc] || DISC_COLOR['Outro'];
                    return (
                      <tr key={s.id} onClick={() => openEdit(s)} style={{cursor:'pointer'}}>
                        <td>{DAYS_SHORT[s.dayIdx]} {s.recurring && '🔁'}</td>
                        <td>{hoursToLabel(s.startHour)}—{hoursToLabel(s.endHour)}</td>
                        <td><span style={{padding:'2px 8px', background: d.soft, color: d.color, fontWeight:600, fontSize:11}}>{s.disc}</span></td>
                        <td>{s.title}</td>
                        <td>{TYPE_CONFIG[s.type]?.icon} {TYPE_CONFIG[s.type]?.label}</td>
                        <td style={{textAlign:'right'}}>{(s.endHour - s.startHour).toFixed(1)}h</td>
                        <td style={{textAlign:'right', fontSize:11, color:'var(--muted)'}}>
                          {s.goalQ ? `${s.goalQ}q` : ''} {s.goalF ? `· ${s.goalF}f` : ''}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        )}

        {view === 'week' && sessions.length === 0 && (
          <div style={{
            textAlign:'center', padding:'24px', background:'var(--ink)', color:'var(--paper)',
            marginTop:16, fontSize:14
          }}>
            <span style={{color:'var(--acid)', fontWeight:600}}>↑</span> Clica em qualquer hora na grade acima pra criar sua primeira sessão.
          </div>
        )}

        <div className="legend">
          {Object.entries(DISC_COLOR).filter(([k]) => k !== 'Outro').map(([name, d]) => (
            <span key={name} className="sw"><i style={{background: d.color}} /> {name}</span>
          ))}
          <span className="sw"><i style={{border:`1px dashed #0A1330`, background:'#fff'}} /> Revisão (borda tracejada)</span>
          <span className="sw"><i style={{background:'#E6FF3D'}} /> Simulado (barra ácida)</span>
        </div>
      </main>
    </div>

    {modal && (
      <SessionModal
        session={modal.data}
        isNew={modal.isNew}
        onSave={handleSave}
        onDelete={handleDelete}
        onCancel={() => setModal(null)}
      />
    )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Planner />);
</script>
</body>
</html>
